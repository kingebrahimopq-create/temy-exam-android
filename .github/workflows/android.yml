name: Android Build & Package

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  build:
    name: Build APK & Verify compilation
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant Execute Permission for Gradle
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload Debug APK Artifact
      uses: actions/artifacts-upload@v0.0.1-alpha # Or standard actions/upload-artifact@v4
      # Note: Or better use actions/upload-artifact@v4 which is fully stable
      continue-on-error: true

    - name: Upload APK Stable
      uses: actions/upload-artifact@v4
      with:
        name: temy-exam-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
